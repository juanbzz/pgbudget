name: Bug report
description: Report a bug in pgbudget
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: SQL or Go code to reproduce the issue.
      render: sql
    validations:
      required: false
  - type: dropdown
    id: layer
    attributes:
      label: Layer
      options:
        - Ledger (data/utils/ledger schemas)
        - Budget (budget schema)
        - Tests
        - Migrations
        - Other
    validations:
      required: true
