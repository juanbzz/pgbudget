name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want and why?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: What would the SQL function signature or usage look like?
      render: sql
    validations:
      required: false
  - type: dropdown
    id: layer
    attributes:
      label: Layer
      options:
        - Ledger (data/utils/ledger schemas)
        - Budget (budget schema)
        - Tests
        - Migrations
        - Other
    validations:
      required: true
